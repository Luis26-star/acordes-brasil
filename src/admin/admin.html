<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Acordes Brasil – Admin</title>

  <!-- Styles -->
  <link rel="stylesheet" href="./css/admin.css" />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css)"
    integrity="sha512-T5xgkYkfcJxk..."
    crossorigin="anonymous"
  />
</head>

<body>

  <div class="admin-container">

    <!-- HEADER -->
    <header class="admin-header">
      <h1>
        <i class="fas fa-crown"></i>
        <span>Acordes Brasil</span>
        <small>· Verwaltung</small>
      </h1>

      <button id="logoutBtn" class="btn btn-outline">
        <i class="fas fa-sign-out-alt"></i> Abmelden
      </button>
    </header>

    <!-- NAVIGATION -->
    <nav class="admin-tabs">
      <button class="tab-btn active" data-tab="members">Mitglieder</button>
      <button class="tab-btn" data-tab="events">Events</button>
      <button class="tab-btn" data-tab="finances">Finanzen</button>
    </nav>

    <!-- MEMBERS PANEL -->
    <section id="membersPanel" class="panel active">

      <div class="panel-header">
        <h2><i class="fas fa-users"></i> Mitglieder</h2>
        <button id="openMemberModalBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Mitglied anlegen
        </button>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>E-Mail</th>
              <th>Stimme</th>
              <th>Rolle</th>
              <th>Status</th>
              <th>Aktionen</th>
            </tr>
          </thead>

          <tbody id="membersTableBody">
            <tr><td colspan="6">Laden...</td></tr>
          </tbody>
        </table>
      </div>

    </section>

    <!-- EVENTS PANEL -->
    <section id="eventsPanel" class="panel">

      <div class="panel-header">
        <h2><i class="fas fa-calendar"></i> Events</h2>
        <button id="openEventModalBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Event anlegen
        </button>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Titel</th>
              <th>Typ</th>
              <th>Start</th>
              <th>Ende</th>
              <th>Ort</th>
              <th>Aktionen</th>
            </tr>
          </thead>

          <tbody id="eventsTableBody">
            <tr><td colspan="6">Laden...</td></tr>
          </tbody>
        </table>
      </div>

    </section>

    <!-- FINANCES PANEL -->
    <section id="financesPanel" class="panel">

      <div class="panel-header">
        <h2><i class="fas fa-chart-line"></i> Finanzen</h2>
        <button id="openFinanceModalBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Eintrag anlegen
        </button>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Person</th>
              <th>Betrag</th>
              <th>Typ</th>
              <th>Kommentar</th>
              <th>SEPA</th>
              <th>Bezahlt</th>
              <th>Aktionen</th>
            </tr>
          </thead>

          <tbody id="financeTableBody">
            <tr><td colspan="8">Laden...</td></tr>
          </tbody>
        </table>
      </div>

      <h3>Monatsübersicht</h3>
      <canvas id="financeChart"></canvas>

    </section>

  </div>

  <!-- MEMBER MODAL -->
  <div id="memberModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h3>Mitglied</h3>

      <label>Name <input type="text" id="memberName" /></label>
      <label>E-Mail <input type="email" id="memberEmail" /></label>

      <label>
        Stimme
        <select id="memberVoice">
          <option value="soprano">Sopran</option>
          <option value="alto">Alt</option>
          <option value="tenor">Tenor</option>
          <option value="bass">Bass</option>
        </select>
      </label>

      <label>
        Rolle
        <select id="memberRole">
          <option value="member">Mitglied</option>
          <option value="board">Vorstand</option>
          <option value="admin">Admin</option>
        </select>
      </label>

      <label>
        Status
        <select id="memberStatus">
          <option value="active">Aktiv</option>
          <option value="inactive">Inaktiv</option>
        </select>
      </label>

      <label>
        SEPA Zustimmung?
        <select id="memberSepa">
          <option value="true">Ja</option>
          <option value="false">Nein</option>
        </select>
      </label>

      <div class="modal-actions">
        <button id="saveMemberBtn" class="btn btn-primary">Speichern</button>
        <button data-close="memberModal" class="btn btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- EVENT MODAL -->
  <div id="eventModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h3>Event</h3>

      <label>Titel <input type="text" id="eventTitle" /></label>

      <label>
        Typ
        <select id="eventType">
          <option value="ensaio">Probe</option>
          <option value="concerto">Konzert</option>
          <option value="workshop">Workshop</option>
        </select>
      </label>

      <label>Start <input type="datetime-local" id="eventStart" /></label>
      <label>Ende <input type="datetime-local" id="eventEnd" /></label>
      <label>Ort <input type="text" id="eventLocation" /></label>
      <label>Beschreibung <textarea id="eventDescription"></textarea></label>

      <div class="modal-actions">
        <button id="saveEventBtn" class="btn btn-primary">Speichern</button>
        <button data-close="eventModal" class="btn btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- FINANCE MODAL -->
  <div id="financeModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h3>Finanzeintrag</h3>

      <label>Datum <input type="date" id="financeDate" /></label>
      <label>Person <input type="text" id="financePerson" /></label>
      <label>Betrag (€) <input type="number" id="financeAmount" step="0.01" /></label>

      <label>
        Typ
        <select id="financeType">
          <option value="income">Einnahme</option>
          <option value="expense">Ausgabe</option>
          <option value="fee">Mitgliedsbeitrag</option>
        </select>
      </label>

      <label>Kommentar <textarea id="financeComment"></textarea></label>

      <div class="modal-actions">
        <button id="saveFinanceBtn" class="btn btn-primary">Speichern</button>
        <button data-close="financeModal" class="btn btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js)"></script>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/@supabase/supabase-js)"></script>
  <script src="./js/admin.js"></script>

</body>
</html>
