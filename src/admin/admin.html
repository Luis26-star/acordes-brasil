<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin · Acordes Brasil</title>

  <!-- Styles -->

  <link rel="stylesheet" href="/src/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- PWA -->

  <link rel="manifest" href="/manifest.webmanifest">
</head>

<body>
  <div class="admin-container">

```
<!-- ================= HEADER ================= -->
<header class="admin-header">
  <h1>
    <i class="fas fa-crown"></i>
    <span data-brand-short>Acordes Brasil</span> · Verwaltung
  </h1>

  <div class="header-actions">
    <button id="pushBtn" class="btn btn-outline">
      <i class="fas fa-bell"></i> Push
    </button>

    <button id="logoutBtn" class="btn btn-outline">
      <i class="fas fa-sign-out-alt"></i> Abmelden
    </button>
  </div>
</header>

<!-- ================= NAV / TABS ================= -->
<nav class="admin-tabs">
  <button class="tab-btn active" data-tab="members">
    <i class="fas fa-users"></i> Mitglieder
  </button>

  <button class="tab-btn" data-tab="events">
    <i class="fas fa-calendar-alt"></i> Events
  </button>

  <button class="tab-btn" data-tab="finances">
    <i class="fas fa-euro-sign"></i> Finanzen
  </button>

  <button class="tab-btn" data-tab="analytics">
    <i class="fas fa-chart-bar"></i> Analytics
  </button>
</nav>

<!-- ================= MEMBERS ================= -->
<section id="membersPanel" class="panel active">
  <div class="panel-header">
    <h2><i class="fas fa-user"></i> Mitgliederverwaltung</h2>

    <div class="panel-actions">
      <input type="file" id="csvImport" accept=".csv">
      <button id="importBtn" class="btn btn-outline">
        <i class="fas fa-upload"></i> CSV Import
      </button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>E-Mail</th>
          <th>Stimme</th>
          <th>Rolle</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="membersTableBody">
        <tr><td colspan="6">Laden...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- ================= EVENTS ================= -->
<section id="eventsPanel" class="panel">
  <div class="panel-header">
    <h2><i class="fas fa-music"></i> Eventplanung</h2>

    <button id="openEventModalBtn" class="btn btn-primary">
      <i class="fas fa-plus"></i> Event anlegen
    </button>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Titel</th>
          <th>Typ</th>
          <th>Start</th>
          <th>Ende</th>
          <th>Ort</th>
          <th>Teilnahme</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="eventsTableBody">
        <tr><td colspan="7">Laden...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- ================= FINANCES ================= -->
<section id="financesPanel" class="panel">
  <div class="panel-header">
    <h2><i class="fas fa-chart-line"></i> Finanzübersicht</h2>
  </div>

  <div class="table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Mitglied</th>
          <th>Betrag</th>
          <th>Status</th>
          <th>Fällig</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="feePaymentsList">
        <tr><td colspan="5">Laden...</td></tr>
      </tbody>
    </table>
  </div>
</section>

<!-- ================= ANALYTICS ================= -->
<section id="analyticsPanel" class="panel">
  <div class="panel-header">
    <h2><i class="fas fa-chart-bar"></i> Analytics</h2>
  </div>

  <div class="analytics-grid">
    <div class="chart-card">
      <h3>Stimmenverteilung</h3>
      <canvas id="voiceChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Teilnahme</h3>
      <canvas id="attendanceChart"></canvas>
    </div>
  </div>
</section>
```

  <!-- ================= SCRIPT ================= -->

  <script type="module" src="/src/js/admin.js"></script>

</body>
</html>
