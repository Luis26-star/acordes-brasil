<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-brand-short>Acordes Brasil</title>

  <!-- Styles -->
  <link rel="stylesheet" href="/src/css/admin.css">

  <!-- Icons (später lokal hosten für DSGVO) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="admin-container">

    <!-- HEADER -->
    <header class="admin-header">
      <h1>
        <i class="fas fa-crown" aria-hidden="true"></i>
        <span data-brand-short>Acordes Brasil</span>
        <small>· Verwaltung</small>
      </h1>

      <button id="logoutBtn" class="btn btn-outline">
        <i class="fas fa-sign-out-alt"></i>
        <span>Abmelden</span>
      </button>
    </header>

    <!-- NAV -->
    <nav class="admin-tabs" role="tablist">
      <button class="tab-btn active" data-tab="members" role="tab">Mitglieder</button>
      <button class="tab-btn" data-tab="events" role="tab">Events</button>
      <button class="tab-btn" data-tab="finances" role="tab">Finanzen</button>
    </nav>

    <!-- ===================== -->
    <!-- MEMBERS -->
    <!-- ===================== -->
    <section id="membersPanel" class="panel active" role="tabpanel">

      <div class="panel-header">
        <h2><i class="fas fa-users"></i> Mitgliederverwaltung</h2>

        <button id="openMemberModalBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Mitglied anlegen
        </button>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>E-Mail</th>
              <th>Stimme</th>
              <th>Rolle</th>
              <th>Status</th>
              <th>Aktionen</th>
            </tr>
          </thead>

          <tbody id="membersTableBody">
            <tr><td colspan="6">Laden...</td></tr>
          </tbody>
        </table>
      </div>

    </section>

    <!-- ===================== -->
    <!-- EVENTS -->
    <!-- ===================== -->
    <section id="eventsPanel" class="panel" role="tabpanel">

      <div class="panel-header">
        <h2><i class="fas fa-calendar-alt"></i> Events & Proben</h2>

        <button id="openEventModalBtn" class="btn btn-primary">
          <i class="fas fa-plus"></i> Event anlegen
        </button>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Titel</th>
              <th>Typ</th>
              <th>Start</th>
              <th>Ende</th>
              <th>Ort</th>
              <th>Aktionen</th>
            </tr>
          </thead>

          <tbody id="eventsTableBody">
            <tr><td colspan="6">Laden...</td></tr>
          </tbody>
        </table>
      </div>

    </section>

    <!-- ===================== -->
    <!-- FINANCES -->
    <!-- ===================== -->
    <section id="financesPanel" class="panel" role="tabpanel">

      <h2><i class="fas fa-chart-line"></i> Finanzübersicht</h2>

      <canvas id="financeChart"></canvas>

      <button id="exportCsvBtn" class="btn btn-primary">
        <i class="fas fa-download"></i> CSV-Export
      </button>

    </section>

  </div>

  <!-- ===================== -->
  <!-- MODAL: MEMBER -->
  <!-- ===================== -->
  <div id="memberModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog">

      <h3>Mitglied</h3>

      <label>
        Name
        <input type="text" id="memberName" required>
      </label>

      <label>
        E-Mail
        <input type="email" id="memberEmail" required>
      </label>

      <label>
        Stimme
        <select id="memberVoice">
          <option value="soprano">Sopran</option>
          <option value="contralto">Alt</option>
          <option value="tenor">Tenor</option>
          <option value="baixo">Bass</option>
        </select>
      </label>

      <label>
        Rolle
        <select id="memberRole">
          <option value="member">Mitglied</option>
          <option value="board">Vorstand</option>
          <option value="admin">Admin</option>
        </select>
      </label>

      <label>
        Status
        <select id="memberStatus">
          <option value="active">Aktiv</option>
          <option value="inactive">Inaktiv</option>
        </select>
      </label>

      <div class="modal-actions">
        <button id="saveMemberBtn" class="btn btn-primary">Speichern</button>
        <button data-close="memberModal" class="btn btn-secondary">Abbrechen</button>
      </div>

    </div>
  </div>

  <!-- ===================== -->
  <!-- MODAL: EVENT -->
  <!-- ===================== -->
  <div id="eventModal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog">

      <h3>Event / Probe</h3>

      <label>
        Titel
        <input type="text" id="eventTitle" required>
      </label>

      <label>
        Typ
        <select id="eventType">
          <option value="ensaio">Probe</option>
          <option value="concerto">Konzert</option>
          <option value="workshop">Workshop</option>
        </select>
      </label>

      <label>
        Start
        <input type="datetime-local" id="eventStart" required>
      </label>

      <label>
        Ende
        <input type="datetime-local" id="eventEnd" required>
      </label>

      <label>
        Ort
        <input type="text" id="eventLocation">
      </label>

      <label>
        Beschreibung
        <textarea id="eventDescription"></textarea>
      </label>

      <div class="modal-actions">
        <button id="saveEventBtn" class="btn btn-primary">Speichern</button>
        <button data-close="eventModal" class="btn btn-secondary">Abbrechen</button>
      </div>

    </div>
  </div>

  <!-- APP SCRIPT -->
  <script type="module" src="/src/js/admin.js"></script>
</body>
</html>
