<!DOCTYPE html>
<html>
<head>
  <title>Choir App</title>
</head>
<body>

<h1>Mitglieder</h1>
<ul id="members"></ul>

<h1>Events</h1>
<ul id="events"></ul>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://https://ifrpcqqkyoidyfhjglhk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmcnBjcXFreW9pZHlmaGpnbGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzI5MzYsImV4cCI6MjA5MTkwODkzNn0.x0D5118W2nJh_vfSHgfdf3wjL8Pr4L2aNmV5QrRMRms'
  )

  async function loadMembers() {
    const { data } = await supabase.from('members').select('*')
    const list = document.getElementById('members')

    data.forEach(m => {
      const li = document.createElement('li')
      li.textContent = m.name + ' (' + m.voice_type + ')'
      list.appendChild(li)
    })
  }

  async function loadEvents() {
    const { data } = await supabase.from('events').select('*')
    const list = document.getElementById('events')

    data.forEach(e => {
      const li = document.createElement('li')
      li.textContent = e.title
      list.appendChild(li)
    })
  }

  loadMembers()
  loadEvents()
</script>

</body>
</html>
